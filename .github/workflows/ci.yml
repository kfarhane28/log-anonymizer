name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Test
        run: pytest -q

  build-wheel:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Build wheel+sdist
        run: |
          python -m pip install -U pip
          python -m pip install -U build setuptools wheel
          python -m build --no-isolation
      - name: Smoke test (CLI-only wheel)
        run: bash scripts/smoke_test_wheel.sh
      - name: Smoke test (UI wheel)
        env:
          WITH_UI: "1"
        run: bash scripts/smoke_test_wheel.sh
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t log-anonymizer:ci .
      - name: Docker smoke test (CLI)
        run: docker run --rm log-anonymizer:ci log-anonymizer --help
      - name: Docker smoke test (UI)
        run: docker run --rm log-anonymizer:ci log-anonymizer-ui --check

